# Configuration for cargo-deny (supply-chain security linter).
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
no-default-features = false

[advisories]
# The path where the advisory databases are cloned/fetched into.
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use.
db-urls = ["https://github.com/rustsec/advisory-db"]
# A list of advisory IDs to ignore.
ignore = [
]

[licenses]
# List of explicitly allowed licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
]
# Crate exceptions
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
    # ── windows-sys: multiple semver-incompatible versions from transitive deps ──
    { name = "windows-sys", version = "=0.52.0" },
    { name = "windows-sys", version = "=0.59.0" },
    { name = "windows-sys", version = "=0.60.2" },
    { name = "windows-targets", version = "=0.52.6" },
    { name = "windows_x86_64_msvc", version = "=0.52.6" },
    { name = "windows_x86_64_gnu", version = "=0.52.6" },
    { name = "windows_x86_64_gnullvm", version = "=0.52.6" },
    { name = "windows_i686_msvc", version = "=0.52.6" },
    { name = "windows_i686_gnullvm", version = "=0.52.6" },
    { name = "windows_i686_gnu", version = "=0.52.6" },
    { name = "windows_aarch64_msvc", version = "=0.52.6" },
    { name = "windows_aarch64_gnullvm", version = "=0.52.6" },
    # ── rand: 0.8 used by project, 0.9 used by lopdf ──
    { name = "rand", version = "=0.8.6" },
    { name = "rand_chacha", version = "=0.3.1" },
    { name = "rand_core", version = "=0.6.4" },
    # ── getrandom: multiple versions from different deps ──
    { name = "getrandom", version = "=0.2.17" },
    { name = "getrandom", version = "=0.3.4" },
    # ── hashbrown / foldhash: from indexmap/lru ──
    { name = "hashbrown", version = "=0.15.5" },
    { name = "foldhash", version = "=0.1.5" },
    # ── r-efi: platform-specific ──
    { name = "r-efi", version = "=5.3.0" },
    # ── wit-bindgen: wasm-related ──
    { name = "wit-bindgen", version = "=0.51.0" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
