# =============================================================================
# Brave Search
# =============================================================================
[brave_search]
count = 50
max_tokens = 32768
max_urls = 50
context_threshold_mode = "balanced"
freshness = ""

# =============================================================================
# General Settings
# =============================================================================
[general]
pdf_as_base64 = true
request_timeout = 1800
command_timeout = 300
max_security_log_lines = 1000
max_audit_log_lines = 10000
max_audit_archives = 10
max_chat_log_lines = 5000
max_chat_archives = 5
max_output_lines = 10000
max_output_chars = 100000

# Pager for long output. Supported values:
#   "" (empty)       = disable pager, print everything directly (default)
#   "auto"           = try 'less -FRMe', fall back to built-in pager
#   "less -FRMe"     = use a specific command; falls back to built-in pager on error
pager = "auto"

# =============================================================================
# Security & API Keys
# =============================================================================
[security]
# IMPORTANT: API Keys are NOT checked in this file for security reasons.
# You MUST set them as environment variables (e.g., in ~/.bashrc, ~/.zshrc, or ~/.llm_secure_cli/.env):
#   - OpenRouter:   OPENROUTER_API_KEY
#   - OpenAI:       OPENAI_API_KEY
#   - Ollama:       No API key required for local usage by default.
#   - LiteLLM:      LITELLM_API_KEY (if configured)

# Security Level (high | standard)
# - high (default): Strict PQC enforcement and mandatory Dual LLM verification for high-risk calls.
# - standard: Compatibility mode; warnings instead of blocks for some integrity checks.
security_level = "high"

# Auto-Approval Policy
# Controls which tools can run without human intervention.
# - "none":   All tools require manual approval (Safest).
# - "low":    Only low_risk_tools are auto-approved.
# - "medium": Low and medium risk tools are auto-approved.
# Note: Any 'block' or 'warning' from the Dual LLM auditor will always force manual intervention.
auto_approval_level = "none"

# Path-based access control (Basic Whitelist)
allowed_paths = ["."]

# Whitelist-based Tool Loading
allowed_tools = ["*"]

# Risk Level Classification
high_risk_tools = [
    "execute_python",
]
medium_risk_tools = [
    "brave_search",
]
low_risk_tools = []

# Dual LLM Verification (AI-native ABAC / Semantic Firewall)
# Validates tool calls using a secondary LLM with a hardcoded Security Constitution.
dual_llm_verification = true
dual_llm_provider = "ollama"
dual_llm_model = "gemma4:e2b"
dual_llm_confidence_threshold = 0.7

# Verifier Fallback Policy
verifier_fallback = "require_approval"

# =============================================================================
# OpenAI Compatible Providers
# =============================================================================

[ollama]
# Ollama (Local)
api_url = "http://localhost:11434/v1"

[ollama_cloud]
# Ollama (Cloud)
api_url = "https://ollama.com/v1"

# OpenRouter (Aggregation service)
[openrouter]
api_url = "https://openrouter.ai/api/v1"

# -----------------------------------------------------------------------------
# Custom OpenAI-compatible provider example
# -----------------------------------------------------------------------------
# To add a provider that uses the Anthropic/Gemini-style payload formatter
# (native PDF support, extended vision), set:
#   formatter = "high_feature"
#
# For a plain OpenAI-compatible endpoint, set (or omit — this is the default):
#   formatter = "generic"
#
# Example:
# [anthropic]
# api_url = "https://api.anthropic.com/v1"
# formatter = "high_feature"
#
# [my_local_llm]
# api_url = "http://192.168.1.10:8080/v1"
# formatter = "generic"


