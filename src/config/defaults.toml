# =============================================================================
# General Settings
# =============================================================================
[general]
unified_default_provider = "google"
pdf_as_base64 = true
request_timeout = 1800
command_timeout = 300
max_security_log_lines = 1000
max_audit_log_lines = 10000
max_audit_archives = 10
max_chat_log_lines = 5000
max_chat_archives = 5

# =============================================================================
# Security & API Keys
# =============================================================================
[security]
# IMPORTANT: API Keys are NOT checked in this file for security reasons.
# You MUST set them as environment variables (e.g., in ~/.bashrc, ~/.zshrc, or .env):
#   - OpenAI:       OPENAI_API_KEY
#   - Anthropic:    ANTHROPIC_API_KEY
#   - Google/Gemini: GEMINI_API_KEY (or GOOGLE_API_KEY)
#   - Ollama:       No API key required for local usage.

# Security Level (high | standard)
# - high (default): Strict PQC enforcement and mandatory Dual LLM verification for high-risk calls.
# - standard: Compatibility mode; warnings instead of blocks for some integrity checks.
security_level = "high"

# Auto-Approval Policy
# Controls which tools can run without human intervention.
# - "none":   All tools require manual approval (Safest).
# - "low":    Only low_risk_tools (e.g., list_files) are auto-approved.
# - "medium": Low and medium risk tools are auto-approved.
# Note: Any 'block' or 'warning' from the Dual LLM auditor will always force manual intervention.
auto_approval_level = "none"

# Path-based access control (Basic Whitelist)
# Complex OS-specific blacklists are now handled semantically by the AI Policy Engine.
allowed_paths = ["."]

# Whitelist-based Tool Loading
# If specified, only the tools in this list will be loaded.
allowed_tools = [
    "list_files_in_directory",
    "read_file_content",
    "grep_files",
    "search_files",
    "edit_file",
    "create_or_overwrite_file",
    "read_url_content",
    "brave_search",
    "execute_command"
]

# Risk Level Classification
high_risk_tools = [
    "execute_command",          # Arbitrary command execution
    "edit_file",                # Partial file overwrite
    "create_or_overwrite_file", # Full file overwrite
    "read_url_content",         # External network call
    "brave_search",             # External network call
]
medium_risk_tools = [
    "read_file_content", # Reads file contents
    "grep_files",        # Full-text scans
]
low_risk_tools = [
    "list_files_in_directory", # Metadata only
    "search_files",            # Filename matching only
]

# Dual LLM Verification (AI-native ABAC / Semantic Firewall)
# Validates tool calls using a secondary LLM with a hardcoded Security Constitution.
# This replaces complex, fragile, and OS-dependent static analysis rules.
dual_llm_verification = true
dual_llm_provider = "google"
dual_llm_model = "lite"
dual_llm_confidence_threshold = 0.7

# =============================================================================
# Google Gemini
# =============================================================================
[google]
[google.models]
default = "gemini-3-flash-preview"
lite = "gemini-3.1-flash-lite-preview"
flash = "gemini-3-flash-preview"
pro = "gemini-3.1-pro-preview"
image = { model = "gemini-3.1-flash-image-preview", tools = false }
image-pro = { model = "gemini-3-pro-image-preview", tools = false }
gemma = "gemma-4-31b-it"

# =============================================================================
# OpenAI
# =============================================================================
[openai]
[openai.models]
default = "gpt-5.4-mini"
nano = "gpt-5.4-nano"
mini = "gpt-5.4-mini"
standard = "gpt-5.5"
pro = "gpt-5.5-pro"
image = { model = "gpt-image-2", tools = false, image_generation = true }

# =============================================================================
# Anthropic (Claude)
# =============================================================================
[anthropic]
max_tokens = 8192
[anthropic.models]
default = "claude-sonnet-4-6"
haiku = "claude-haiku-4-5-20251001"
sonnet = "claude-sonnet-4-6"
opus = "claude-opus-4-7"

# =============================================================================
# Ollama (Local LLMs / Ollama Cloud)
# =============================================================================
[ollama]
api_url = "https://ollama.com/v1/chat/completions"
[ollama.models]
default = "gemma4:31b-cloud"
deepseek = "deepseek-v4-flash:cloud"
kimi = "kimi-k2.6:cloud"
gemma = "gemma4:31b-cloud"
glm = "glm-5.1:cloud"
qwen = "qwen3.5:2b"

# =============================================================================
# Templates (Reusable Prompts)
# =============================================================================
[templates]
analyze = """
Analyze the current directory structure and provide a summary of the project's purpose,
key files, and how they interact.
"""
