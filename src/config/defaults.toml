# =============================================================================
# General Settings
# =============================================================================
[general]
unified_default_provider = "google"
pdf_as_base64 = true
request_timeout = 1800
command_timeout = 300
max_command_memory_mb = 1024
max_command_file_size_mb = 100
max_security_log_lines = 1000
max_audit_log_lines = 10000
max_audit_archives = 10

# =============================================================================
# Security & API Keys
# =============================================================================
[security]
# IMPORTANT: API Keys are NOT checked in this file for security reasons.
# You MUST set them as environment variables (e.g., in ~/.bashrc, ~/.zshrc, or .env):
#   - OpenAI:       OPENAI_API_KEY
#   - Anthropic:    ANTHROPIC_API_KEY
#   - Google/Gemini: GEMINI_API_KEY (or GOOGLE_API_KEY)
#   - Ollama:       No API key required for local usage.

# Security Level (high | standard)
# - high (default): Strict PQC enforcement for all high-risk tool calls.
# - standard: Compatibility mode for non-llm-secure-cli clients or legacy MCP servers.
security_level = "high"

# Runtime Environment (local | tee)
# - local (default): Executes tasks on the local system.
# - tee: Future support for Trusted Execution Environments (TEE).
runtime_type = "local"

# Auto-Approval Policy
# Controls which tools can run without human intervention.
# - "none":   All tools require manual approval (Safest).
# - "low":    Only low_risk_tools (e.g., list_files) are auto-approved.
# - "medium": Low and medium risk tools are auto-approved.
# Note: Any 'verification_warning' from Dual LLM will always force manual approval.
auto_approval_level = "none"

# Path-based access control (Resource Attributes)
allowed_paths = ["."]
allowed_env_vars = []

# Explicitly forbidden paths. Use absolute paths or "~" expansion.
blocked_paths = [
    "/etc", "/var", "/root", "/bin", "/sbin", "/usr", "/dev", "/proc", "/sys", "/boot", "~/.ssh"
]

# Filename blocklist — fnmatch patterns matched against the bare filename.
# Unlike blocked_paths, these protect sensitive files that live *inside* the
# working directory (allowed_paths). The agent cannot read them via
# read_file_content, grep_files or search_files. If access is truly needed, it must go
# through execute_command (HIGH risk, always HITL).
blocked_filenames = [
    # Environment / secrets files
    ".env", ".env.*",           # .env, .env.local, .env.production, etc.
    "*.pem", "*.key", "*.p12", "*.pfx",   # TLS/SSL private keys & certificates
    "*.cer", "*.crt",           # Certificates (may contain private key)
    "id_rsa", "id_ecdsa", "id_ed25519",   # SSH private keys (non-dot names)
    "*.ppk",                    # PuTTY private key
]

# Whitelist-based Tool Loading
# If specified, only the tools in this list will be loaded.
# This applies to both built-in tools and remote MCP tools.
# If commented out or empty (None), all tools are loaded by default.
allowed_tools = [
    "list_files_in_directory",
    "read_file_content",
    "grep_files",
    "search_files",
    "edit_file",
    "create_or_overwrite_file",
    "read_url_content",
    "brave_search",
    "execute_command"
]

# Risk Level Classification
#
# HIGH   - Irreversible writes / external network access.
#          Always requires explicit human approval; never auto-approved.
# MEDIUM - Local data read-only access.
#          Exposes file or directory contents to the LLM; no writes.
# LOW    - Metadata only (file names, sizes, timestamps).
#          Never reads file contents.

high_risk_tools = [
    "execute_command",          # Arbitrary command execution: highest risk
    "edit_file",                # Partial file overwrite: irreversible change
    "create_or_overwrite_file", # Full file overwrite: irreversible change
    "read_url_content",         # External network call: SSRF / data-exfiltration risk
    "brave_search",             # External network call: data-exfiltration risk
]
medium_risk_tools = [
    "read_file_content", # Reads file contents and exposes them to the LLM (no writes)
    "grep_files",        # Full-text scans and exposes file contents to the LLM (no writes)
]
# Low-risk tools that only expose metadata, never file contents
low_risk_tools = [
    "list_files_in_directory", # File names, sizes, timestamps only (no content exposure)
    "search_files",            # File name pattern matching only (no content exposure)
]

# Security Posture (CASS)
# All high-risk and medium-risk tools now require PQC identity proof by default
# for robust non-repudiation and integrity.

# Dual LLM Verification (Dynamic Guardrails)
# Validates high-risk tool execution against user intent using a lightweight model.
# To use this feature:
# 1. Set dual_llm_verification = true.
# 2. Configure a secondary provider/model. It's recommended to use a fast,
#    "lite" model (e.g., gemini-3.1-flash-lite, gpt-5.4-mini) to minimize latency.
# 3. Ensure the secondary provider has its API key set in your environment.
dual_llm_verification = true
dual_llm_provider = "google"
dual_llm_model = "lite"
dual_llm_confidence_threshold = 0.7

# =============================================================================
# Attribute-Based Access Control (ABAC) Rules
# =============================================================================
# Define custom rules based on execution context attributes.
# Rules are evaluated in order; the first matching rule determines the effect.
# Available attributes:
# - subject.id (Current OS user)
# - env.git_branch (Current Git branch)
# - env.os (OS name)
# - env.cwd (Current working directory)
# - subject.has_pqc_proof (Boolean: Whether PQC signature is present)
#
# Example:
# [[security.abac_rules]]
# name = "Allow main branch"
# description = "Always allow operations when on main branch for rapid development"
# match_attributes = { "env.git_branch" = "main" }
# effect = "allow"

# =============================================================================
# Google Gemini
# =============================================================================
[google]
[google.models]
default = "gemini-3-flash-preview"
lite = "gemini-3.1-flash-lite-preview"
flash = "gemini-3-flash-preview"
pro = "gemini-3.1-pro-preview"
image = { model = "gemini-3.1-flash-image-preview", tools = false }
image-pro = { model = "gemini-3-pro-image-preview", tools = false }

# =============================================================================
# OpenAI
# =============================================================================
[openai]
[openai.models]
default = "gpt-5.4-mini"
nano = "gpt-5.4-nano"
mini = "gpt-5.4-mini"
standard = "gpt-5.4"
image = { model = "gpt-image-2", tools = false }

# =============================================================================
# Anthropic (Claude)
# =============================================================================
[anthropic]
max_tokens = 8192
[anthropic.models]
default = "claude-sonnet-4-6"
haiku = "claude-haiku-4-5-20251001"
sonnet = "claude-sonnet-4-6"
opus = "claude-opus-4-7"

# =============================================================================
# Ollama (Local LLMs)
# =============================================================================
[ollama]
api_url = "http://localhost:11434/v1/chat/completions"
[ollama.models]
default = "gemma4:e2b"

# =============================================================================
# Model Context Protocol (MCP) Servers
# =============================================================================
# Each [[mcp_servers]] entry defines a server that the AI agent can use.
#
# zero_trust (Boolean):
# If true, llm-secure-cli injects a Post-Quantum Cryptography (PQC) signed Identity Token
# and its public keys into the server's environment (MCP_AUTH_TOKEN).
# The remote server (if llm-secure-cli based) will verify this token to enforce ABAC.
# Default is false.
#
# Example: Connecting to a remote server via SSH to use llm-secure-cli's MCP mode.
# This allows the AI agent to execute commands on the remote server as tools.
#
# [[mcp_servers]]
# name = "remote-agent"
# command = "ssh"
# args = ["-T", "user@remote-host", "llsc", "--mcp-server"]
# zero_trust = true

