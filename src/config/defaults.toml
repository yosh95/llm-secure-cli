# =============================================================================
# General Settings
# =============================================================================
[general]
pdf_as_base64 = true
request_timeout = 1800
command_timeout = 3600
image_save_path = "~/Pictures/llsc"
max_audit_log_lines = 10000
max_chat_log_lines = 5000
max_chat_archives = 5
max_output_lines = 5000
max_output_chars = 50000


# =============================================================================
# Security Settings
# =============================================================================
# DO NOT set API keys here — use environment variables instead.

[security]
# When true, all Y/n and feedback prompts are automatically answered Yes.
# Equivalent to the old LLM_SECURE_AUTO_APPROVE env var.
# WARNING: This bypasses all user confirmation — use with extreme caution.
auto_approve = false

# Master switch for the Verifier Committee.
# When true (default), tool calls are verified by the configured committee.
# When false, all tool calls fall through to manual human approval.
verifier_enabled = true

# Verifier Committee members (provider:model strings, e.g. "ollama:gemma4:e2b").
# You can manage committee members at runtime using:
#   /verifier add <provider:model>     — persists to state.toml
#   /verifier delete <provider:model>  — removes from state.toml
#   /verifier list                     — shows current members
#
# The list below is used as a FALLBACK when state.toml has no members configured.
# verifier_committee = ["ollama:gemma4:e2b", "openai:gpt-4o-mini"]

# Committee voting policy: "majority" (default) or "any-flag".
# - "majority" (balanced): majority vote decides. Reduces false positives
#   compared to any-flag while maintaining strong security.
# - "any-flag" (conservative): if ANY member flags the call as NeedsApproval,
#   human approval is required. Minimizes missed attacks but causes more
#   unnecessary human review.
# committee_policy = "majority"



# =============================================================================
# PQC (Post-Quantum Cryptography) Settings
# =============================================================================

[pqc]
# PQC signature variant for ML-DSA (FIPS 204).
# Available options:
#   "ml-dsa-44"  — NIST Security Level 2 (lowest, fastest, smallest keys)
#   "ml-dsa-65"  — NIST Security Level 3 (balanced)
#   "ml-dsa-87"  — NIST Security Level 5 (highest, slowest, largest keys)
# Default: ml-dsa-44 (lowest for performance)
# signature_variant = "ml-dsa-44"

# PQC KEM variant for ML-KEM (FIPS 203).
# Available options:
#   "ml-kem-512"  — NIST Security Level 1 (lowest, fastest, smallest keys)
#   "ml-kem-768"  — NIST Security Level 3 (balanced)
#   "ml-kem-1024" — NIST Security Level 5 (highest, slowest, largest keys)
# Default: ml-kem-512 (lowest for performance)
# kem_variant = "ml-kem-512"


# =============================================================================
# OpenAI Compatible Providers
# =============================================================================

[ollama]
# Ollama (Local)
api_url = "http://localhost:11434/v1"

# OpenRouter (Aggregation service)
[openrouter]
api_url = "https://openrouter.ai/api/v1"

# -----------------------------------------------------------------------------
# Custom OpenAI-compatible provider example
# -----------------------------------------------------------------------------
# To add a provider that uses the Anthropic/Gemini-style payload formatter
# (native PDF support, extended vision), set:
#   formatter = "high_feature"
#
# For a plain OpenAI-compatible endpoint, set (or omit — this is the default):
#   formatter = "generic"
#
# Example:
# [anthropic]
# api_url = "https://api.anthropic.com/v1"
# formatter = "high_feature"
#
# [my_local_llm]
# api_url = "http://192.168.1.10:8080/v1"
# formatter = "generic"

# =============================================================================
# MCP Servers (Model Context Protocol)
# =============================================================================
# MCP servers provide tools to the AI agent. Supported transport types:
#   - "stdio" (default): Launch a local process and communicate via stdin/stdout
#   - "streamable-http": Connect to a remote MCP server over HTTPS
#
# Example stdio server:
# [[mcp_servers]]
# name = "filesystem"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem"]
# transport = "stdio"
#
# Example Streamable HTTP server:
# [[mcp_servers]]
# name = "remote-tools"
# command = ""  # Not used for HTTP transport
# transport = "streamable-http"
# api_url = "https://mcp.example.com/v1"
