[package]
name = "llm-secure-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "llsc"
path = "src/bin/llm-secure-cli.rs"

[[bin]]
name = "llsc-security"
path = "src/bin/llm-secure-cli-security.rs"

[[bin]]
name = "llsc-models"
path = "src/bin/llm-secure-cli-models.rs"

[[bin]]
name = "llsc-benchmark-dual"
path = "src/bin/llm-secure-cli-benchmark-dual.rs"

[dependencies]
clap = { version = "3.2.25", features = ["derive"] }
tokio = { version = "1.43", features = ["full"] }
reqwest = { version = "0.11", default-features = false, features = ["json", "stream", "gzip", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "5.0"
colored = { version = "2.1", features = [] }
console = "0.15"
textwrap = "0.16"
termimad = "0.25"
indicatif = "0.17"
dialoguer = "0.11"
anyhow = "1.0"
async-trait = "0.1"
futures = "0.3.31"
log = "0.4"
env_logger = "0.10"
path-clean = "1.0"
regex = "1.10"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "=3.12.0"
base64 = "0.21"
url = "2.5"
sha2 = "0.10"
hex = "0.4"
ring = "0.17"
once_cell = "1.18"
idna = "=0.4.0"
hashbrown = "=0.14.3"
indexmap = "=2.2.6"
libc = "0.2"
mime_guess = "2.0"
html2text = "0.6"
difflib = "0.4"
urlencoding = "2.1"
rustyline = "12.0"
# PQC support (Reference implementations)
pqcrypto-mldsa = "0.1"
pqcrypto-mlkem = "0.1"
pqcrypto-traits = "0.3"
aes-gcm = "0.10"


[dev-dependencies]
tokio-test = "0.4"
