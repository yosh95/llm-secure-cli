[package]
name = "llm-secure-cli"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "llsc"
path = "src/bin/llm-secure-cli.rs"

[[bin]]
name = "llsc-security"
path = "src/bin/llm-secure-cli-security.rs"

[[bin]]
name = "llsc-models"
path = "src/bin/llm-secure-cli-models.rs"

[[bin]]
name = "llsc-benchmark-dual"
path = "src/bin/llm-secure-cli-benchmark-dual.rs"

[[bin]]
name = "comprehensive-benchmark"
path = "src/bin/comprehensive_benchmark.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.43", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "gzip", "rustls-tls-webpki-roots"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1"
dirs = "6.0"
colored = { version = "3.1.1", features = [] }
console = "0.16"
textwrap = "0.16"
termimad = "0.34"
indicatif = "0.18"
dialoguer = "0.12"
anyhow = "1.0"
async-trait = "0.1"
futures = "0.3.31"
log = "0.4"
env_logger = "0.11"
path-clean = "1.0"
regex = "1.11"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3.12"
base64 = "0.22"
url = "2.5"
sha2 = { version = "0.11", features = ["oid"] }
hex = "0.4"
ring = "0.17"
once_cell = "1.20"
idna = "1.1"
hashbrown = "0.17"
indexmap = "2.2"
libc = "0.2"
mime_guess = "2.0"
html2text = "0.12"
difflib = "0.4"
urlencoding = "2.1"
rustyline = "18.0"
# PQC support (Pure Rust)
saorsa-pqc = "0.5"
aes-gcm = "0.10"
ciborium = "0.2"
rsa = "0.10.0-rc.17"
uuid = { version = "1.10", features = ["v4"] }
hostname = "0.4"
rand = "0.10"
constant_time_eq = "=0.4.2"


[dev-dependencies]
tokio-test = "0.4"
